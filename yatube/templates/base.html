<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link src="{% static 'img/fav/fav.ico' %}" rel="icon" type="image">
    <link src="{% static 'img/fav/apple-touch-icon.png' %}" rel="apple-touch-icon" sizes="180x180">
    <link src="{% static 'img/fav/favicon-32x32.png' %}"rel="icon" type="image/png" sizes="32x32">
    <link src="{% static 'img/fav/favicon-16x16.png' %}" rel="icon" type="image/png" sizes="16x16">
    <meta name="msapplication-TileColor" content="#000">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <title>
      {% block title %}
        Контент не подвезли, но скоро подвезут!
      {% endblock %}
      </title>
  </head>
  <body>
    {% include 'includes/header.html' %}
    <main>
      <div class="container py-5">
        {% block content %}
          Контент не подвезли, но скоро подвезут!
        {% endblock %}
      </div>
    </main>
    <footer class="border-top text-center py-3">
      {% include 'includes/footer.html' %} 
    </footer>
  </body>
</html>
